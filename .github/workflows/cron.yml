name: Hourly Cron Bot

on:
  schedule:
    # ตั้งค่าให้รันทุกๆ ต้นชั่วโมง (เช่น 07:00, 08:00, 09:00)
    - cron: "0 * * * *"
  workflow_dispatch: # ปุ่มกดรันแบบ Manual (เอาไว้ทดสอบ)

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cron API
        env:
          # ดึงรหัสลับจากสเต็ปที่ 1 มาใช้
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        # ใช้คำสั่ง curl ยิงไปที่ API ของ Vercel พร้อมแนบ Authorization Header
        run: |
          curl -X GET "https://st-plus-system-office.vercel.app/api/cron/morning-brief" \
          -H "Authorization: Bearer $CRON_SECRET"
